# Api keys, sensitive data, credential 
# we will scan all secret via GitLeasks

name: Secrets Scan

on:
    workflow_call:

jobs:
    secrets-scan:
     
        runs-on: unbuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            
            - name: Run GitLeaks Scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # github action manages it

                 